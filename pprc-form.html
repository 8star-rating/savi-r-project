<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Add PPCR Record</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-[Inter] min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        
        <div class="mb-6">
            <button onclick="window.location.href='pprc.html'" class="bg-[#ff5353] hover:bg-red-500 text-white rounded-full w-12 h-12 flex items-center justify-center shadow-md transition">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor" class="w-6 h-6 -ml-1">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
                </svg>
            </button>
        </div>

        <h1 class="text-4xl md:text-5xl font-black text-black uppercase tracking-wide mb-3">ADD NEW PPCR RECORD</h1>
        <div class="h-1 w-full bg-[#8c1919] mb-8"></div>

        <form action="#" method="POST">
            
            <h2 class="text-[#8c1919] font-extrabold uppercase tracking-widest text-sm mb-3 ml-2">PATIENT DETAILS</h2>
            <div class="bg-[#fdfaf5] border border-[#8c1919]/10 rounded-[2rem] p-6 md:p-8 mb-8 shadow-sm">
                
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                    <div class="col-span-2">
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Patient Name</label>
                        <input type="text" name="patient_name" placeholder="Full Name" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-[#8c1919] text-sm text-gray-700">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Age</label>
                        <input type="number" name="age" placeholder="Age" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-[#8c1919] text-sm text-gray-700">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Gender</label>
                        <select name="gender" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-[#8c1919] text-sm text-gray-700">
                            <option value="">Select...</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
            </div>

            <h2 class="text-[#8c1919] font-extrabold uppercase tracking-widest text-sm mb-3 ml-2">INCIDENT & ASSESSMENT</h2>
            <div class="bg-[#fdfaf5] border border-[#8c1919]/10 rounded-[2rem] p-6 md:p-8 mb-8 shadow-sm">
                
                <div class="mb-4">
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Incident Location</label>
                    <input type="text" name="incident_location" placeholder="Where did the incident occur?" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-[#8c1919] text-sm text-gray-700">
                </div>

                <div class="mb-4 w-full md:w-1/3">
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Priority Level</label>
                    <select name="priority" class="w-full bg-white border border-gray-200 rounded-full p-3 outline-none focus:border-[#8c1919] text-sm text-gray-700">
                        <option value="Low">Low</option>
                        <option value="Waitlisted">Waitlisted</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div>
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Chief Complaint / Injury</label>
                    <textarea name="chief_complaint" rows="4" placeholder="Describe the patient's condition, injuries, and symptoms..." class="w-full bg-white border border-gray-200 rounded-2xl p-4 outline-none focus:border-[#8c1919] text-sm text-gray-700 resize-none"></textarea>
                </div>
            </div>

            <div class="flex justify-end mt-4">
                <button type="submit" class="bg-[#6b0f0f] hover:bg-[#4a0a0a] text-white font-bold py-4 px-12 rounded-full shadow-lg transition duration-200 tracking-wider">
                    Submit Record
                </button>
            </div>

        </form>
    </div>

</body>
</html>
