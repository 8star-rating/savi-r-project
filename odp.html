<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operational Documentation and Planning</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Instrument Sans', sans-serif;
            overflow-x: hidden;
        }
    </style>
</head>
<body class="bg-white min-h-screen relative flex items-center justify-center py-10">

    <!-- layout-->
    <div class="w-full max-w-6xl px-8 md:px-16 z-10">
        
        <!-- back button -->
        <button type="button" id="back" class="w-12 h-12 bg-[#ff5252] rounded-full flex items-center justify-center mb-16 shadow-lg hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>

        <!--title-->
        <header class="mb-12">
            <h1 class="text-4xl md:text-[54px] font-extrabold text-black leading-[1.1] tracking-tight uppercase">
                Operational Documentation<br>& Planning
            </h1>
        </header>

        <!--cards-->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8">

            <!--iap-->
            <button type="button" id="iap" class="group relative aspect-square bg-[#ffb753] rounded-[2.5rem] p-8 flex flex-col items-start text-left shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all overflow-hidden">
                <div class="z-10 uppercase font-extrabold tracking-wider text-black text-lg xl:text-xl leading-tight">
                    Incident<br>Action Plans
                </div>
                <img src="./images/whitecboard.png" class="absolute -bottom-4 -right-8 w-52 h-52 opacity-100 shadow-black-200 pointer-events-none">
            </button>

            <!--aar-->
            <button type="button" id="aar" class="group relative aspect-square bg-[#45c066] rounded-[2.5rem] p-8 flex flex-col items-start text-left shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all overflow-hidden">
                <div class="z-10 uppercase font-extrabold tracking-wider text-black text-lg xl:text-xl leading-tight">
                    After<br>Activity<br>Reports
                </div>
                <img src="./images/whitecboard.png" class="absolute -bottom-4 -right-8 w-52 h-52 opacity-100 shadow-black-200 pointer-events-none">
            </button>

            <!--wlr-->
            <button type="button" id="wlr" class="group relative aspect-square bg-[#2cc5ae] rounded-[2.5rem] p-8 flex flex-col items-start text-left shadow-lg hover:shadow-xl hover:-translate-y-1 transition-all overflow-hidden">
                <div class="z-10 uppercase font-extrabold tracking-wider text-black text-lg xl:text-xl leading-tight">
                    Weekly Log<br>Reports
                </div>
                <img src="./images/whitecboard.png" class="absolute -bottom-4 -right-8 w-52 h-52 opacity-100 shadow-black-200 pointer-events-none">
            </button>

        </div>

        <script>
            document.getElementById('iap').addEventListener('click', function(){
                window.location.href = 'iap.html';
            });
            document.getElementById('aar').addEventListener('click', function(){
                window.location.href = 'aar.html';
            });
            document.getElementById('wlr').addEventListener('click', function(){
                window.location.href = 'wlr.html';
            });
            document.getElementById('back').addEventListener('click', function(){
                window.location.href = 'user.html';
            });
        </script>

    </div>
</body> 
</html>
