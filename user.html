<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Dashboard</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
    </style>
</head>

<body class="bg-white min-h-screen relative flex items-center justify-center py-10">

    <div class="w-full max-w-6xl px-8 md:px-16 z-10">
        <header class="mb-12">
            <h1 class="text-5xl font-bold text-black tracking-widest font-['Inter']"> WELCOME! 
                <span class="text-red-600 tracking-tight">User67</span>
            </h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 lg:gap-8">

            <button type="button" id="odp" class="group relative aspect-square bg-[#ff5353] rounded-[2.5rem] p-8 flex flex-col items-start text-left drop-shadow-lg hover:drop-shadow-xl hover:-translate-y-1 hover:bg-[#ff3a3a] transition-all overflow-hidden">
                <div class="z-10 uppercase font-bold tracking-wider text-black font-[Instrument+Sans] text-lg xl:text-xl leading-tight text-left">
                    <p>Operational</p>
                    <p>Documentation</p>
                    <p>And Planning</p>
                </div>
                <img src="./images/whitecboard.png" class="absolute -bottom-4 -right-7 w-52 h-52 opacity-100 pointer-events-none">
            </button>

            <button type="button" id="pprc" class="group relative aspect-square bg-[#8c1919] rounded-[2.5rem] p-8 flex flex-col items-start text-left drop-shadow-lg hover:drop-shadow-xl hover:-translate-y-1 hover:bg-[#601111] transition-all overflow-hidden">
                <div class="z-10 uppercase font-bold tracking-wider text-white font-[Instrument+Sans] text-lg xl:text-xl leading-tight text-left">
                    <p>Pre-Hospital</p>
                    <p>Patient Care</p>
                    <p>Records</p>
                </div>
                <img src="./images/whitecross.png" class="absolute -bottom-9 -right-7 w-56 h-56 opacity-100 pointer-events-none">
            </button>

            <button type="button" id="prsn" class="group relative aspect-square bg-[#ff674c] rounded-[2.5rem] p-8 flex flex-col items-start text-left drop-shadow-lg hover:drop-shadow-xl hover:-translate-y-1 hover:bg-[#ed5a41] transition-all overflow-hidden">
                <div class="z-10 uppercase font-bold tracking-wider text-black font-[Instrument+Sans] text-lg xl:text-xl leading-tight text-left">
                    <p>Personnel</p>
                </div>
                <img src="./images/whiteicon.png" class="absolute -bottom-12 -right-3 w-48 h-58 opacity-100 shadow-black-200 pointer-events-none">
            </button>

        </div>
    </div>

        <script>
        document.getElementById('odp').addEventListener('click', function() {
              window.location.href = 'odp.html';
        });

        document.getElementById('pprc').addEventListener('click', function() {
              window.location.href = 'pprc.html';
        });

        document.getElementById('prsn').addEventListener('click', function() {
              window.location.href = 'personnel.html';
        });
        </script>
</body> 
</html>
