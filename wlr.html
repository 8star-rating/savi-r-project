<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Weekly Log Reports</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-[Inter] min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <div class="mb-10">
            <button onclick="window.location.href='odp.html'" class="w-12 h-12 bg-[#ff5353] rounded-full flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
        </div>

        <div class="flex justify-between items-center -mt-10 mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-800 tracking-wide uppercase">WEEKLY LOG REPORTS</h1>
                <p class="text-gray-500 mt-2">Manage and view weekly log reports</p>
            </div>
            
            <img src="./images/clipboard.png" class="w-28 h-28">
        </div>

        <div class="w-full h-0.5 bg-[#ff5353] -mt-5 mb-4"></div>

        <div class="bg-[#fffffd] p-5 rounded-2xl shadow-sm mb-8 flex gap-4 border border-gray-100">
            <input type="text" placeholder="Search record..." 
                class="grow p-3 rounded-lg bg-gray-50 border-none outline-none focus:ring-2 focus:ring-[#ff5353] text-gray-700">
            
            <select class="p-3 rounded-lg bg-gray-50 border-none outline-none focus:ring-2 focus:ring-[#ff5353] text-gray-700 cursor-pointer">
                <option value="">Resolved</option>
                <option value="Admin">Pending</option>
                <option value="Staff">Unresolved</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider border-b border-gray-100">
                        <th class="p-5 font-semibold">Report ID</th>
                        <th class="p-5 font-semibold">Title</th>
                        <th class="p-5 font-semibold text-center">Status</th>
                        <th class="p-5 font-semibold text-center admin-element hidden">Actions</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700">
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                        <td class="p-5 font-bold">WLR-001</td>
                        <td class="p-5 text-gray-500">Name1</td>
                        <td class="p-5 text-center"><span class="text-green-500 font-bold">• Resolved</span></td>
                        <td class="p-5 text-center admin-element hidden">
                            <button class="text-blue-500 hover:text-blue-700 font-bold mr-4 transition">Edit</button>
                            <button class="text-red-500 hover:text-red-700 font-bold transition">Delete</button>
                        </td>
                    </tr>
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                        <td class="p-5 font-bold">WLR-002</td>
                        <td class="p-5 text-gray-500">Name2</td>
                        <td class="p-5 text-center"><span class="text-yellow-500 font-bold">• Pending</span></td>
                        <td class="p-5 text-center admin-element hidden">
                            <button class="text-blue-500 hover:text-blue-700 font-bold mr-4 transition">Edit</button>
                            <button class="text-red-500 hover:text-red-700 font-bold transition">Delete</button>
                        </td>
                    </tr>
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-5 font-bold">WLR-003</td>
                        <td class="p-5 text-gray-500">Name3</td>
                        <td class="p-5 text-center"><span class="text-red-500 font-bold">• Unresolved</span></td>
                        <td class="p-5 text-center admin-element hidden">
                            <button class="text-blue-500 hover:text-blue-700 font-bold mr-4 transition">Edit</button>
                            <button class="text-red-500 hover:text-red-700 font-bold transition">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8 justify-end flex user-element">
            <button onclick="window.location.href='wr-form.html'" class="bg-[#5E0000] hover:bg-[#9c0606] text-white font-bold py-3 px-6 rounded-[2.5rem] shadow-md transition fixed">
                + Add New Record
            </button>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('savi_role') || 'user'; 
            if (role === 'admin') {
                document.querySelectorAll('.admin-element').forEach(el => el.classList.remove('hidden'));
                document.querySelectorAll('.user-element').forEach(el => el.classList.add('hidden'));
            }
        });
    </script>
</body>
</html>
