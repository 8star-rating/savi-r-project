<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Dashboard</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend:wght@600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
</head>
<script src="https://cdn.tailwindcss.com"></script>
<body class="bg-white">
    <div class="min-h-screen flex items-center justify-center p-6 -translate-y-48">     
        <h1 class="text-5xl font-bold text-black tracking-widest font-['Inter']"> WELCOME! <span class="text-red-600 tracking-tight">User67</span></h1>
    </div>

    <div class="flex flex-wrap justify-center gap-6 w-full max-w-175 mx-auto -mt-96 md:max-w-5xl">

        <button type="button" id="odp" class="relative w-6/12 h-44 bg-[#ff5353] flex flex-col items-start justify-start p-5 rounded-[2.5rem] shadow-sm hover:bg-[#ff3a3a] transition overflow-hidden border-b-mist-500 md:w-3/12">
            <div class="z-10 uppercase font-bold tracking-wider text-black font-[Instrument+Sans] text-m leading-tight text-left">
                <p>Operational</p>
                <p>Documentation</p>
                <p>And Planning</p>
            </div>
            <img src="./images/whitecboard.png" class="absolute -bottom-4 -right-4 w-32 h-32 opacity-100 pointer-events-none">
        </button>

        <script>
            document.getElementById('odp').addEventListener('click', function() {
              window.location.href = 'odp.html';
            });
          </script>

        <button type="button" id="pprc" class="relative w-6/12 h-44 bg-[#8c1919] flex flex-col items-start justify-start p-5 rounded-[2.5rem] shadow-sm hover:bg-[#601111] transition overflow-hidden border-b-mist-500 md:w-3/12">
            <div class="z-10 uppercase font-bold tracking-wider text-white font-[Instrument+Sans] text-m leading-tight text-left">
                <p>Pre-Hospital</p>
                <p>Patient Care</p>
                <p>Records</p>
            </div>
            <img src="./images/whitecross.png" class="absolute -bottom-4 -right-4 w-32 h-32 opacity-100 pointer-events-none">
        </button>

        <script>
            document.getElementById('pprc').addEventListener('click', function() {
              window.location.href = 'pprc.html';
            });
          </script>

        <button type="button" id="prsn" class="relative w-6/12 h-44 bg-[#ff674c] flex flex-col items-start justify-start p-6 rounded-[2.5rem] shadow-sm hover:bg-[#ed5a41] transition overflow-hidden border-b-mist-500 md:w-3/12">
            <div class="z-10 uppercase font-bold tracking-wider text-black font-[Instrument+Sans] text-xl leading-tight text-left">
                <p>Personnel</p>
            </div>
            <img src="./images/whiteicon.png" class="absolute -bottom-8 -right-3 w-28 h-42 opacity-100 shadow-black-200 pointer-events-none">
        </button>

        <script>
            document.getElementById('prsn').addEventListener('click', function() {
              window.location.href = 'personnel.html';
            });
          </script>
    </div>
</body> 
</html>
