<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Menu & Settings</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-[Inter] min-h-screen p-8 flex items-center justify-center">

    <div class="max-w-5xl w-full grid grid-cols-1 md:grid-cols-3 gap-8">
        
        <div class="col-span-1 bg-white rounded-[2.5rem] p-8 shadow-sm border border-gray-100 flex flex-col gap-6">
            <div class="text-center mt-4">
                <div id="profile-initials" class="w-24 h-24 bg-[#ffb5b5] rounded-full mx-auto mb-4 flex items-center justify-center text-red-700 text-3xl font-black tracking-tighter shadow-inner">
                    </div>
                <h2 id="profile-name" class="text-xl font-bold text-gray-800"></h2>
                <p id="profile-role" class="text-red-500 font-semibold text-sm uppercase tracking-wider mt-1"></p>
            </div>
            
            <hr class="border-gray-100 my-2">
            
            <nav class="flex flex-col gap-3">
                <button id="btn-password" onclick="switchTab('password')" class="text-left px-5 py-4 bg-red-50 text-red-700 font-bold rounded-2xl transition tracking-wide">
                    🔒 Password & Security
                </button>
                <button id="btn-profile" onclick="switchTab('profile')" class="text-left px-5 py-4 text-gray-500 hover:bg-gray-50 font-semibold rounded-2xl transition tracking-wide">
                    👤 Edit Profile
                </button>
            </nav>
            
            <div class="mt-auto pt-8">
                <button onclick="window.location.href='index.html'" class="w-full py-4 text-red-600 font-bold bg-white border-2 border-red-100 rounded-xl hover:bg-red-50 transition uppercase tracking-widest text-sm">
                    Log Out
                </button>
            </div>
        </div>

        <div class="col-span-1 md:col-span-2 bg-white rounded-[2.5rem] p-8 md:p-10 shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold text-gray-800 tracking-wide">SETTINGS</h1>
                <button id="dynamic-back-btn" class="text-gray-400 hover:text-gray-800 font-semibold transition flex items-center gap-2 cursor-pointer">
                    ← Back to Dashboard
                </button>
            </div>

            <div id="section-password" class="block">
                <div class="bg-[#ffb5b5] rounded-2xl p-6 mb-8">
                    <h3 class="text-red-900 font-bold text-lg mb-1 tracking-wide">Password Management</h3>
                    <p class="text-red-800 text-sm font-medium">Update your account credentials. For security, please use a strong password.</p>
                </div>

                <form action="#" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-gray-700 font-bold text-sm mb-2 ml-1">Current Password</label>
                        <input type="password" name="current_password" placeholder="Enter current password" required 
                        class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-gray-700 bg-gray-50">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-gray-700 font-bold text-sm mb-2 ml-1">New Password</label>
                            <input type="password" name="new_password" placeholder="Create new password" required 
                            class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-gray-700 bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-bold text-sm mb-2 ml-1">Confirm New Password</label>
                            <input type="password" name="confirm_password" placeholder="Confirm new password" required 
                            class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-gray-700 bg-gray-50">
                        </div>
                    </div>
                    <div class="pt-6">
                        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-xl shadow-md transition tracking-widest uppercase text-sm">
                            Update Password
                        </button>
                    </div>
                </form>
            </div>

            <div id="section-profile" class="hidden">
                <div class="bg-[#ffb5b5] rounded-2xl p-6 mb-8">
                    <h3 class="text-red-900 font-bold text-lg mb-1 tracking-wide">Profile Information</h3>
                    <p class="text-red-800 text-sm font-medium">Update your personal details and contact information.</p>
                </div>

                <form action="#" method="POST" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-gray-700 font-bold text-sm mb-2 ml-1">First Name</label>
                            <input type="text" id="input-first-name" name="first_name" required 
                            class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-gray-700 bg-gray-50">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-bold text-sm mb-2 ml-1">Last Name</label>
                            <input type="text" id="input-last-name" name="last_name" required 
                            class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-gray-700 bg-gray-50">
                        </div>
                    </div>
                    <div>
                        <label class="block text-gray-700 font-bold text-sm mb-2 ml-1">Official Email Address</label>
                        <input type="email" id="input-email" name="email" required 
                        class="w-full p-4 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-400 outline-none text-gray-700 bg-gray-50">
                    </div>
                    <div>
                        <label class="block text-gray-400 font-bold text-sm mb-2 ml-1">System Access Role (Read Only)</label>
                        <input type="text" id="input-role" disabled 
                        class="w-full p-4 rounded-xl border border-gray-200 text-gray-400 bg-gray-100 cursor-not-allowed">
                    </div>
                    <div class="pt-6">
                        <button type="submit" class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 px-8 rounded-xl shadow-md transition tracking-widest uppercase text-sm">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>

        </div>
    </div>

    <script>
        // Tab Switching Logic
        function switchTab(tabName) {
            const secPassword = document.getElementById('section-password');
            const secProfile = document.getElementById('section-profile');
            const btnPassword = document.getElementById('btn-password');
            const btnProfile = document.getElementById('btn-profile');

            const inactiveClass = "text-left px-5 py-4 text-gray-500 hover:bg-gray-50 font-semibold rounded-2xl transition tracking-wide";
            const activeClass = "text-left px-5 py-4 bg-red-50 text-red-700 font-bold rounded-2xl transition tracking-wide";
            
            btnPassword.className = inactiveClass;
            btnProfile.className = inactiveClass;
            secPassword.style.display = 'none';
            secProfile.style.display = 'none';

            if (tabName === 'password') {
                secPassword.style.display = 'block';
                btnPassword.className = activeClass;
            } else if (tabName === 'profile') {
                secProfile.style.display = 'block';
                btnProfile.className = activeClass;
            }
        }

        // Smart Profile Data & Routing Logic
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('savi_role') || 'user'; 
            
            // 1. Dynamic Back Button
            const backBtn = document.getElementById('dynamic-back-btn');
            backBtn.onclick = () => {
                if (role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'user.html';
                }
            };

            // 2. Populate Profile Data Based on Role
            const profileInitials = document.getElementById('profile-initials');
            const profileName = document.getElementById('profile-name');
            const profileRole = document.getElementById('profile-role');
            
            const inputFirstName = document.getElementById('input-first-name');
            const inputLastName = document.getElementById('input-last-name');
            const inputEmail = document.getElementById('input-email');
            const inputRole = document.getElementById('input-role');

            if (role === 'admin') {
                // Set to Kim Ian Lipat
                profileInitials.textContent = 'KL';
                profileName.textContent = 'Kim Ian Lipat';
                profileRole.textContent = 'System Admin';
                
                inputFirstName.value = 'Kim Ian';
                inputLastName.value = 'Lipat';
                inputEmail.value = 'kilipat@usep.edu.ph';
                inputRole.value = 'System Admin';
            } else {
                // Set to Juan Dela Cruz
                profileInitials.textContent = 'JD';
                profileName.textContent = 'Juan Dela Cruz';
                profileRole.textContent = 'Staff';
                
                inputFirstName.value = 'Juan';
                inputLastName.value = 'Dela Cruz';
                inputEmail.value = 'juan@usep.edu.ph';
                inputRole.value = 'Staff';
            }
        });
    </script>
</body>
</html>
