<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Personnel Directory</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-[Inter] min-h-screen p-8">

    <div class="max-w-6xl mx-auto">
        <button onclick="window.location.href='user.html'" class="w-12 h-12 bg-[#ff5252] rounded-full flex items-center justify-center mb-16 shadow-lg hover:scale-110 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>

        <div class="flex justify-between items-center -mt-10 mb-8">
            <div>
                <h1 class="text-4xl font-bold text-gray-800 tracking-wide">PERSONNEL DIRECTORY</h1>
                <p class="text-gray-500 mt-2">Manage and view active DRRM Office staff</p>
            </div>
            
            <img src="./images/icon.png" class="w-18 h-24">
        </div>

        <div class="w-full h-0.5 bg-[#ff5252] -mt-5 mb-4"></div>

        <div class="bg-[#fffffd] p-5 rounded-2xl shadow-sm mb-8 flex gap-4 border border-gray-100">
            <input type="text" placeholder="Search by name or email..." 
                class="grow p-3 rounded-lg bg-gray-50 border-none outline-none focus:ring-2 focus:ring-[#ff674c] text-gray-700">
            
            <select class="p-3 rounded-lg bg-gray-50 border-none outline-none focus:ring-2 focus:ring-[#ff674c] text-gray-700 cursor-pointer">
                <option value="">All Roles</option>
                <option value="Admin">Admin</option>
                <option value="Staff">Standard Staff</option>
            </select>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-500 text-sm uppercase tracking-wider border-b border-gray-100">
                        <th class="p-5 font-semibold">Name</th>
                        <th class="p-5 font-semibold">Email</th>
                        <th class="p-5 font-semibold">Role</th>
                        <th class="p-5 font-semibold text-center">Status</th>
                    </tr>
                </thead>
                <tbody class="text-gray-700">
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                        <td class="p-5 font-bold">Arjen Greer Bonggo</td>
                        <td class="p-5 text-gray-500">agbonggo@usep.edu.ph</td>
                        <td class="p-5"><span class="bg-red-100 text-red-700 py-1 px-3 rounded-full text-xs font-bold uppercase">Admin</span></td>
                        <td class="p-5 text-center"><span class="text-green-500 font-bold">• Active</span></td>
                    </tr>
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition">
                        <td class="p-5 font-bold">Kim Ian Lipat</td>
                        <td class="p-5 text-gray-500">kilipat@usep.edu.ph</td>
                        <td class="p-5"><span class="bg-red-100 text-red-700 py-1 px-3 rounded-full text-xs font-bold uppercase">Admin</span></td>
                        <td class="p-5 text-center"><span class="text-green-500 font-bold">• Active</span></td>
                    </tr>
                    <tr class="hover:bg-gray-50 transition">
                        <td class="p-5 font-bold">Juan Dela Cruz</td>
                        <td class="p-5 text-gray-500">juan@usep.edu.ph</td>
                        <td class="p-5"><span class="bg-gray-200 text-gray-700 py-1 px-3 rounded-full text-xs font-bold uppercase">Staff</span></td>
                        <td class="p-5 text-center"><span class="text-green-500 font-bold">• Active</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-8 justify-end flex">
            <button onclick="window.location.href='personnel-form.html'" class="bg-[#5E0000] hover:bg-[#9c0606] text-white font-bold py-3 px-6 rounded-[2.5rem] shadow-md transition fixed">
                + Add New Personnel
            </button>
        </div>

    </div>
</body>
</html>
