<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savi-R | Add AAR Record</title>
    <link rel="stylesheet" type="text/css" href="output.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-[Inter] min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto relative">
        
        <button onclick="window.location.href='aar.html'" class="absolute -top-2 -left-16 bg-[#45c066] hover:bg-green-500 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-md transition hidden md:flex">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
            </svg>
        </button>

        <h1 class="text-4xl md:text-5xl font-black text-black uppercase tracking-wide mb-3">ADD NEW AAR RECORD</h1>
        <div class="h-1 w-full bg-green-600 mb-8"></div>

        <form action="#" method="POST">
            
            <h2 class="text-green-600 font-extrabold uppercase tracking-widest text-sm mb-3 ml-2">ACTIVITY DETAILS</h2>
            <div class="bg-[#fdfaf5] border border-green-900/10 rounded-[2rem] p-6 md:p-8 mb-8 shadow-sm">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div class="col-span-2">
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Activity Name</label>
                        <input type="text" name="activity_name" placeholder="e.g., Earthquake Drill Q1" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-green-400 text-sm text-gray-700">
                    </div>
                    <div class="col-span-1">
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Date of Activity</label>
                        <input type="date" name="activity_date" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-green-400 text-sm text-gray-700">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Location</label>
                        <input type="text" name="location" placeholder="e.g., USeP Main Campus" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-green-400 text-sm text-gray-700">
                    </div>
                    <div>
                        <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Lead Organizer</label>
                        <input type="text" name="lead_organizer" placeholder="Name or Department" class="w-full bg-white border border-gray-200 rounded-xl p-3 outline-none focus:border-green-400 text-sm text-gray-700">
                    </div>
                </div>
            </div>

            <h2 class="text-green-600 font-extrabold uppercase tracking-widest text-sm mb-3 ml-2">EVALUATION & REMARKS</h2>
            <div class="bg-[#fdfaf5] border border-green-900/10 rounded-[2rem] p-6 md:p-8 mb-8 shadow-sm">
                
                <div class="mb-4 w-full md:w-1/3">
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Total Participants</label>
                    <input type="number" name="participant_count" placeholder="0" class="w-full bg-white border border-gray-200 rounded-full p-3 outline-none focus:border-green-400 text-sm text-gray-700">
                </div>

                <div class="mb-4">
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Key Outcomes & Successes</label>
                    <textarea name="outcomes" rows="3" placeholder="What went well?" class="w-full bg-white border border-gray-200 rounded-2xl p-4 outline-none focus:border-green-400 text-sm text-gray-700 resize-none"></textarea>
                </div>

                <div class="mb-4">
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Challenges & Issues</label>
                    <textarea name="challenges" rows="3" placeholder="What problems occurred?" class="w-full bg-white border border-gray-200 rounded-2xl p-4 outline-none focus:border-green-400 text-sm text-gray-700 resize-none"></textarea>
                </div>

                <div>
                    <label class="block text-black font-extrabold text-xs uppercase mb-1 ml-1">Recommendations for Next Time</label>
                    <textarea name="recommendations" rows="2" placeholder="Actionable feedback..." class="w-full bg-white border border-gray-200 rounded-2xl p-4 outline-none focus:border-green-400 text-sm text-gray-700 resize-none"></textarea>
                </div>
            </div>

            <div class="flex justify-end mt-4">
                <button type="submit" class="bg-[#1b5e20] hover:bg-[#0d3311] text-white font-bold py-4 px-12 rounded-full shadow-lg transition duration-200 tracking-wider">
                    Submit Report
                </button>
            </div>

        </form>
    </div>

</body>
</html>
